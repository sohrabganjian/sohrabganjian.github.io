# JupyterLab 4.x TeX extensions (jupyterlab/static/9826*.js AllPackages preLoad).
# mathtools / textcomp / textmacros are listed first so \\coloneqq and \\textdagger
# register before other TeX runs (MathJax load order matters).
# Sync: tools/jupyter-jekyll-config/nbconvert_templates/base/mathjax.html.j2
#
# operator_macros: site-wide \\QFT (etc.) so notebooks do not rely on DeclareMathOperator
# surviving nbconvert’s single-document HTML the same way as live Jupyter.
operator_macros:
  QFT: "\\operatorname{QFT}"
loader:
  - "[tex]/mathtools"
  - "[tex]/textcomp"
  - "[tex]/textmacros"
  - "[tex]/ams"
  - "[tex]/newcommand"
  - "[tex]/noerrors"
  - "[tex]/noundefined"
  - "[tex]/action"
  - "[tex]/amscd"
  - "[tex]/bbox"
  - "[tex]/boldsymbol"
  - "[tex]/braket"
  - "[tex]/bussproofs"
  - "[tex]/cancel"
  - "[tex]/cases"
  - "[tex]/centernot"
  - "[tex]/color"
  - "[tex]/colorv2"
  - "[tex]/colortbl"
  - "[tex]/empheq"
  - "[tex]/enclose"
  - "[tex]/extpfeil"
  - "[tex]/gensymb"
  - "[tex]/html"
  - "[tex]/mhchem"
  - "[tex]/physics"
  - "[tex]/upgreek"
  - "[tex]/unicode"
  - "[tex]/verb"
  - "[tex]/configmacros"
  - "[tex]/tagformat"
  - "[tex]/setoptions"
packages:
  - mathtools
  - textcomp
  - textmacros
  - ams
  - newcommand
  - noerrors
  - noundefined
  - action
  - amscd
  - bbox
  - boldsymbol
  - braket
  - bussproofs
  - cancel
  - cases
  - centernot
  - color
  - colorv2
  - colortbl
  - empheq
  - enclose
  - extpfeil
  - gensymb
  - html
  - mhchem
  - physics
  - upgreek
  - unicode
  - verb
  - configmacros
  - tagformat
  - setoptions
